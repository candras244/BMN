<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Gedung</title>

<link rel="stylesheet" href="../css/admin.css">

</head>
<body>

<div class="main" style="margin-left:0;width:100%;">

    <div class="topbar">
        <h2>Data Gedung</h2>
        <div class="date">SIM-DBR</div>
    </div>

    <div class="content">

        <div class="panel">

            <div class="panel-header">
                Daftar Gedung
            </div>

            <div class="panel-body">

                <input
                    type="text"
                    id="cariGedung"
                    placeholder="Cari Gedung..."
                    style="
                    width:100%;
                    padding:12px;
                    margin-bottom:20px;
                    border-radius:10px;
                    border:none;
                    ">

                <table>

                    <thead>
                        <tr>
                            <th>ID Gedung</th>
                            <th>Nama Gedung</th>
                            <th>Jumlah Ruangan</th>
                            <th>Jumlah Aset</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>

                    <tbody id="dataGedung">

                        <tr>
                            <td colspan="5">
                                Memuat data...
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="../js/gedung.js"></script>

</body>
</html>
