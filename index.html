<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard - Sistem</title>
</head>
<body>
<script>
    // Periksa login
    if (localStorage.getItem("login") !== "true") {
        window.location.href = "login.html";
    }

    // Tampilkan info pengguna
    const username = localStorage.getItem('username');
    const role = localStorage.getItem('role');

    document.body.innerHTML = `
        <h2>Selamat datang, ${username} (${role})</h2>
        <button id="logoutBtn">Keluar</button>
        <hr />
        <h3>Manajemen Pengguna (Hanya Super Admin)</h3>
        <div id="adminSection"></div>
        <script>
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('login');
                localStorage.removeItem('role');
                localStorage.removeItem('username');
                window.location.href = 'login.html';
            });

            // Cek role
            if ('${role}' !== 'superadmin') {
                document.getElementById('adminSection').innerHTML = '<p>Hanya Super Admin yang dapat mengakses bagian ini.</p>';
            } else {
                // Tampilkan form tambah pengguna
                document.getElementById('adminSection').innerHTML = \`
                    <h4>Tambah Pengguna Baru</h4>
                    <form id="addUserForm">
                        <label>Username:</label>
                        <input type="text" id="newUsername" required /><br />
                        <label>Password:</label>
                        <input type="password" id="newPassword" required /><br />
                        <label>Role:</label>
                        <select id="newRole">
                            <option value="user">User</option>
                            <option value="superadmin">Super Admin</option>
                        </select><br />
                        <button type="submit">Tambah Pengguna</button>
                    </form>
                \`;

                // Handle tambah pengguna
                document.getElementById('addUserForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const newUsername = document.getElementById('newUsername').value;
                    const newPassword = document.getElementById('newPassword').value;
                    const newRole = document.getElementById('newRole').value;

                    let users = JSON.parse(localStorage.getItem('users')) || [];

                    // Cek duplikasi username
                    if (users.find(u => u.username === newUsername)) {
                        alert('Username sudah digunakan!');
                        return;
                    }

                    users.push({ username: newUsername, password: newPassword, role: newRole });
                    localStorage.setItem('users', JSON.stringify(users));
                    alert('Pengguna berhasil ditambahkan!');
                    // Reset form
                    document.getElementById('addUserForm').reset();
                });
            }
        <\/script>
    `;
</script>
</body>
</html>
