<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Halaman Utama</title>
</head>
<body>
<h2>Selamat Datang di Sistem</h2>
<button id="loginBtn">Login</button>

<h3 id="welcomeMsg"></h3>
<div id="adminFeatures" style="display:none;">
    <h4>Fitur Admin</h4>
    <button id="tambahUserBtn">Tambah Pengguna</button>
    <!-- fitur tambahan bisa disini -->
</div>

<script>
    // Cek status login
    function checkLogin() {
        const loggedIn = localStorage.getItem('login');
        if (loggedIn === 'true') {
            const username = localStorage.getItem('username');
            document.getElementById('welcomeMsg').textContent = 'Selamat datang, ' + username;
            const role = localStorage.getItem('role');
            if (role === 'superadmin') {
                document.getElementById('adminFeatures').style.display = 'block';
            } else {
                document.getElementById('adminFeatures').style.display = 'none';
            }
        } else {
            document.getElementById('welcomeMsg').textContent = '';
            document.getElementById('adminFeatures').style.display = 'none';
        }
    }

    document.getElementById('loginBtn').addEventListener('click', () => {
        window.location.href = 'login.html'; // Arahkan ke halaman login
    });

    // Panggil check login saat halaman dimuat
    window.onload = checkLogin;
</script>
</body>
</html>
