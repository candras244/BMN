<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SIM-DBR Admin</title>
    <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<script>
    // Validasi login
    if (localStorage.getItem("login") !== "true") {
        window.location.href = "login.html";
    }
</script>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        📋 SIM-DBR
    </div>
    <div class="menu">
        <div class="menu-title">Dashboard</div>
        <a href="#" class="active" id="menu-dashboard">📊 Dashboard</a>

        <div class="menu-title">Master Data</div>
        <a href="#" id="menu-gedung">🏢 Gedung</a>
        <a href="#" id="menu-ruangan">🚪 Ruangan</a>
        <a href="#" id="menu-aset">📦 Master Aset</a>

        <div class="menu-title">Transaksi</div>
        <a href="#" id="menu-mutasi">🔄 Mutasi</a>
        <a href="#" id="menu-kondisi">🛠 Kondisi Aset</a>

        <div class="menu-title">Laporan</div>
        <a href="#" id="menu-dbr">📄 DBR</a>
        <a href="#" id="menu-statistik">📈 Statistik</a>

        <div class="menu-title">Sistem</div>
        <a href="#" id="menu-admin">👤 Admin</a>
        <a href="#" id="menu-hakakses">🔐 Hak Akses</a>
        <a href="#" id="menu-pengaturan">⚙ Pengaturan</a>
    </div>
    <div class="user-box">
        <strong>Bag. Umum</strong>
        <span>Super Admin</span>
        <button class="logout" id="btn-logout">🔓 Keluar</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
        <h2 id="page-title">Dashboard</h2>
        <div class="date" id="current-date">06 Juni 2026</div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="page-content">
        <!-- Default content: Dashboard -->
        <div class="welcome">
            <h1>Selamat Datang 👋</h1>
            <p>Sistem Informasi Manajemen Daftar Barang Ruangan</p>
        </div>
    </div>
</div>

<script>
    // Fungsi untuk mengatur tanggal hari ini
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', {
        day: 'numeric', month: 'long', year: 'numeric'
    });

    // Logout
    document.getElementById('btn-logout').addEventListener('click', () => {
        localStorage.removeItem('login');
        window.location.href = 'login.html';
    });

    // Navigasi menu
    const pageTitle = document.getElementById('page-title');
    const pageContent = document.getElementById('page-content');

    // Fungsi untuk mengubah konten halaman
    function loadPage(title, contentHTML) {
        pageTitle.textContent = title;
        pageContent.innerHTML = contentHTML;
    }

    // Event listener menu
    document.getElementById('menu-dashboard').addEventListener('click', () => {
        loadPage('Dashboard', `
            <div class="welcome">
                <h1>Selamat Datang 👋</h1>
                <p>Sistem Informasi Manajemen Daftar Barang Ruangan</p>
            </div>
        `);
    });

    document.getElementById('menu-gedung').addEventListener('click', () => {
        loadPage('Master Data - Gedung', `
            <h3>Data Gedung</h3>
            <p>Fitur untuk mengelola data gedung akan ditampilkan di sini.</p>
        `);
    });

    document.getElementById('menu-ruangan').addEventListener('click', () => {
        loadPage('Master Data - Ruangan', `
            <h3>Data Ruangan</h3>
            <p>Fitur untuk mengelola data ruangan akan ditampilkan di sini.</p>
        `);
    });

    document.getElementById('menu-aset').addEventListener('click', () => {
        loadPage('Master Data - Aset', `
            <h3>Data Aset</h3>
            <p>Fitur untuk mengelola data aset akan ditampilkan di sini.</p>
        `);
    });

    document.getElementById('menu-mutasi').addEventListener('click', () => {
        loadPage('Transaksi - Mutasi', `
            <h3>Mutasi Aset</h3>
            <p>Fitur untuk mutasi aset akan ditampilkan di sini.</p>
        `);
    });

    document.getElementById('menu-kondisi').addEventListener('click', () => {
        loadPage('Transaksi - Kondisi Aset', `
            <h3>Perbaikan Kondisi Aset</h3>
            <p>Fitur untuk kondisi aset akan ditampilkan di sini.</p>
        `);
    });

    document.getElementById('menu-dbr').addEventListener('click', () => {
        loadPage('Laporan - DBR', `
            <h3>Laporan DBR</h3>
            <p>Fitur laporan DBR akan ditampilkan di sini.</p>
        `);
    });

    document.getElementById('menu-statistik').addEventListener('click', () => {
        loadPage('Laporan - Statistik', `
            <h3>Statistik</h3>
            <p>Fitur statistik akan ditampilkan di sini.</p>
        `);
    });

    document.getElementById('menu-admin').addEventListener('click', () => {
        loadPage('Sistem - Admin', `
            <h3>Pengelolaan Admin</h3>
            <p>Fitur pengelolaan admin akan ditampilkan di sini.</p>
        `);
    });

    document.getElementById('menu-hakakses').addEventListener('click', () => {
        loadPage('Sistem - Hak Akses', `
            <h3>Hak Akses Pengguna</h3>
            <p>Fitur pengelolaan hak akses akan ditampilkan di sini.</p>
        `);
    });

    document.getElementById('menu-pengaturan').addEventListener('click', () => {
        loadPage('Sistem - Pengaturan', `
            <h3>Pengaturan Sistem</h3>
            <p>Fitur pengaturan sistem akan ditampilkan di sini.</p>
        `);
    });
</script>
</body>
</html>
