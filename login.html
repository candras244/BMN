<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin - SIM-DBR</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>
            SIM-DBR
        </h1>

        <p>
            Login Administrator
        </p>

        <br>

        <div class="form-group">

            <label>
                Username
            </label>

            <input
                type="text"
                id="username"
                class="form-control">

        </div>

        <div class="form-group">

            <label>
                Password
            </label>

            <input
                type="password"
                id="password"
                class="form-control">

        </div>

        <br>

        <button
            class="btn btn-primary"
            onclick="login()">

            LOGIN

        </button>

        <br><br>

        <a
            href="index.html">

            Kembali ke Homepage

        </a>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
