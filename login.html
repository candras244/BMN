<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login SIM-DBR</title>

<link rel="stylesheet" href="css/login.css">

</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h1>SIM-DBR</h1>

        <p>
            Sistem Informasi Manajemen
            Daftar Barang Ruangan
        </p>

        <form id="loginForm">

            <input
            type="text"
            id="username"
            placeholder="Username"
            required>

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <button type="submit">
                Masuk
            </button>

        </form>

        <div id="message"></div>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
